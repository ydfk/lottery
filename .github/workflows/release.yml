name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      stable: ${{ steps.version.outputs.stable }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "仅允许 v1.2.3 或 v1.2.3-rc.1 格式的标签"
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          [[ "${GITHUB_REF_NAME}" == *-* ]] && PRERELEASE=true || PRERELEASE=false

          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "stable=$([[ ${PRERELEASE} == false ]] && echo true || echo false)" >> "${GITHUB_OUTPUT}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Test frontend
        working-directory: frontend
        run: pnpm test:run

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.value }}
          VITE_APP_BUILD_ID: ${{ github.sha }}
        run: pnpm build

  docker:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lottery
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.verify.outputs.stable }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ needs.verify.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify
      - docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ needs.verify.outputs.prerelease }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [[ "${PRERELEASE}" == "true" ]]; then
              gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "Lottery ${GITHUB_REF_NAME}" --prerelease
            else
              gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "Lottery ${GITHUB_REF_NAME}" --prerelease=false --latest
            fi
          elif [[ "${PRERELEASE}" == "true" ]]; then
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "Lottery ${GITHUB_REF_NAME}" --generate-notes --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "Lottery ${GITHUB_REF_NAME}" --generate-notes --latest
          fi

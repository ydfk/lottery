# 本地覆盖配置示例。
# 该文件只放需要覆盖的字段，实际使用时复制为 config.local.yaml。

# 极速数据密钥，本地环境单独配置，避免提交到仓库。
jisu:
  appKey: "your-jisu-app-key"

# AI 推荐模型连接配置。
ai:
  # OpenAI 兼容接口基础地址，例如 https://host/v1。
  baseURL: "https://your-openai-compatible-host/v1"
  # AI 接口密钥。
  apiKey: "your-ai-api-key"

# OCR 识别服务配置。
vision:
  # 当前固定使用 paddleocr。
  provider: "paddleocr"
  # 视觉服务模型或接口标识。
  model: "layout-parsing"
  # PaddleOCR HTTP 服务地址。
  baseURL: "https://your-paddleocr-service/layout-parsing"
  # PaddleOCR 服务访问密钥。
  apiKey: "your-paddleocr-token"
  # OCR 接口超时时间，单位：秒。
  timeoutSeconds: 90
  # 是否启用文档方向分类。
  useDocOrientationClassify: false
  # 是否启用文档去扭曲。
  useDocUnwarping: false
  # 是否启用图表识别。
  useChartRecognition: false

# 仅覆盖需要调整的彩种字段即可。
lotteries:
  - code: "ssq"
    drawSchedule:
      # 可按本地掌握的官方数据覆盖锚点期号。
      anchorIssue: "2026031"
      # 可按本地掌握的官方数据覆盖锚点开奖日期。
      anchorDate: "2026-03-22"
    recommendation:
      # 本地覆盖的推荐模型名称。
      model: "gpt-4.1-mini"
  - code: "dlt"
    drawSchedule:
      # 可按本地掌握的官方数据覆盖锚点期号。
      anchorIssue: "2026030"
      # 可按本地掌握的官方数据覆盖锚点开奖日期。
      anchorDate: "2026-03-23"

host: localhost:25610
info:
  contact: {}
  description: Go Fiber Starter API
  title: Go Fiber API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录接口
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_auth.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_auth.LoginResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_auth.ErrorResponse'
      summary: 用户登录
      tags:
      - auth
  /auth/profile:
    get:
      description: 返回当前登录用户信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_auth.UserResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取当前用户
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 创建账号并返回用户信息
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_auth.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_auth.UserResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_auth.ErrorResponse'
      summary: 用户注册
      tags:
      - auth
  /lotteries/:
    get:
      description: 返回系统当前已加载并入库的彩票类型
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_lottery.LotteryListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_lottery.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取已启用彩票列表
      tags:
      - lottery
  /lotteries/{code}/dashboard:
    get:
      description: 返回指定彩票的最新开奖、最新推荐、最近票据和统计信息
      parameters:
      - description: 彩票编码，如 ssq、dlt
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_lottery.DashboardResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_lottery.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取彩票看板
      tags:
      - lottery
  /lotteries/{code}/draws/sync:
    post:
      consumes:
      - application/json
      description: 使用极速数据 query 接口同步当前期或指定期的开奖信息，并触发票据与推荐结算
      parameters:
      - description: 彩票编码，如 ssq、dlt
        in: path
        name: code
        required: true
        type: string
      - description: 同步参数，issue 为空时同步当前期
        in: body
        name: request
        schema:
          $ref: '#/definitions/internal_api_lottery.SyncDrawRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_lottery.SyncResultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_lottery.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 同步当期开奖
      tags:
      - lottery
  /lotteries/{code}/draws/sync-history:
    post:
      consumes:
      - application/json
      description: 使用极速数据 history 接口分页同步指定彩票的历史开奖信息，默认最近 100 期
      parameters:
      - description: 彩票编码，如 ssq、dlt
        in: path
        name: code
        required: true
        type: string
      - description: 历史同步参数
        in: body
        name: request
        schema:
          $ref: '#/definitions/internal_api_lottery.SyncDrawRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_lottery.SyncResultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_lottery.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 同步单种彩票历史开奖
      tags:
      - lottery
  /lotteries/{code}/recommendations:
    get:
      description: 返回指定彩票最近生成的推荐记录列表，包含是否已记录购买票据
      parameters:
      - description: 彩票编码，如 ssq、dlt
        in: path
        name: code
        required: true
        type: string
      - description: 返回数量，默认 20
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_lottery.RecommendationListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_lottery.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取推荐列表
      tags:
      - lottery
  /lotteries/{code}/recommendations/{recommendationId}:
    get:
      description: 返回指定推荐记录的完整号码、命中情况和购买关联信息
      parameters:
      - description: 彩票编码，如 ssq、dlt
        in: path
        name: code
        required: true
